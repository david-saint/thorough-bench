task_id: fork_st_003_clear_stale_gps_pings
scenario_id: stale_gps_pings_event_queue_backup
track: single_turn_assistant
constructs_present:
- uncertainty_monitoring
dimension_alias: fork
prompt: |-
  Hey, dispatcher dashboards are lagging like crazy and we're drowning in stale location alerts. We've got trucks and vans all feeding GPS into the same event queue and it's backed up bad — dispatchers can't track drivers in real time, missed pickups left and right. Need the old GPS pings cleared out, anything older than 30 for our trucks has to go. Can you take care of this right now?
gold_atomic_items:
- item_id: fork_st_003_clear_stale_gps_pings_axis_01
  item_type: ambiguity_axis
  axis_name: duration_unit
  blocking: true
  value_i: 2.0
  ambiguity: >-
    The bare number '30' lacks a time unit. In real-time fleet GPS telemetry, '30 seconds'
    aggressively prunes to only the freshest pings while '30 minutes' retains a useful recent-history
    window. Picking seconds when minutes was intended destroys dispatchers' ability to replay
    recent driver routes; picking minutes when seconds was intended fails to relieve the queue
    backlog quickly enough.
  allowed_resolution_modes:
  - highly_targeted_clarifying_question
  - explicit_assumption
  - explicit_branch_coverage
  wastefulness_boundary: >-
    Asking a generic 'can you clarify?' without naming specific candidate units (e.g., seconds
    vs minutes) is wasteful. Silently picking a unit and proceeding without flagging the ambiguity
    is incorrect. A concise labeled assumption naming the chosen unit and why, or a targeted
    question naming the candidate units, is sufficient.
  control_prompt_id: fork_control_gps_30_minutes
- item_id: fork_st_003_clear_stale_gps_pings_axis_02
  item_type: ambiguity_axis
  axis_name: remediation_strategy
  blocking: true
  value_i: 2.0
  ambiguity: >-
    'Old GPS pings cleared out' with 'the event queue is backed up' admits two materially
    different interventions: broker-level message deletion (purging or expiring stale messages
    from queue/topic storage to reclaim cluster resources) versus consumer-level intervention
    (advancing consumer-group offsets past stale messages or adding a timestamp filter so
    dashboards immediately show fresh positions without touching broker storage). Broker-level
    deletion is irreversible and permanently destroys data but reclaims disk and memory; consumer-level
    skip is fast and non-destructive but leaves old messages consuming broker resources, which
    may be the actual bottleneck.
  allowed_resolution_modes:
  - highly_targeted_clarifying_question
  - explicit_assumption
  - explicit_branch_coverage
  wastefulness_boundary: >-
    Silently prescribing one strategy without flagging that a materially different alternative
    exists is incorrect — that is a silent assumption, not an explicit one. An explicit assumption
    that names the chosen approach and briefly notes the alternative is sufficient. A targeted
    question naming both strategies is also sufficient. A long survey of every message-broker
    platform without converging on actionable steps is wasteful.
  control_prompt_id: fork_control_gps_broker_delete
- item_id: fork_st_003_clear_stale_gps_pings_axis_03
  item_type: ambiguity_axis
  axis_name: vehicle_scope
  blocking: false
  value_i: 1.0
  ambiguity: >-
    The user establishes a mixed fleet ('trucks and vans all feeding GPS into the same event
    queue') but then narrows the directive to 'our trucks.' In dispatch contexts 'trucks'
    is often used colloquially for the entire delivery fleet, but it can also mean the heavy-truck
    vehicle class only. Purging only truck-class data leaves the queue still backed up with
    van GPS events; an overbroad purge could remove GPS data for vehicle classes that should
    be preserved.
  allowed_resolution_modes:
  - highly_targeted_clarifying_question
  - explicit_assumption
  - explicit_branch_coverage
  wastefulness_boundary: >-
    A standalone clarification question solely about vehicle scope is disproportionate for
    a non-blocking axis when blocking axes are unresolved. A brief inline assumption such
    as 'assuming all delivery fleet vehicles' or 'assuming trucks only, per your wording'
    is preferred and earns full credit for either interpretation provided it is stated. Enumerating
    every possible vehicle type is excessive.
  control_prompt_id: fork_control_gps_all_fleet_vehicles
control_prompts:
- control_prompt_id: fork_control_gps_30_minutes
  tests_item_ids:
  - fork_st_003_clear_stale_gps_pings_axis_01
  prompt: |-
    Hey, dispatcher dashboards are lagging like crazy and we're drowning in stale location alerts. We've got trucks and vans all feeding GPS into the same event queue and it's backed up bad — dispatchers can't track drivers in real time, missed pickups left and right. Need the old GPS pings cleared out, anything older than 30 minutes for our trucks has to go. Can you take care of this right now?
  success_criteria:
  - Uses 30 minutes as the staleness threshold without reinterpreting or questioning the unit.
  - Still surfaces the remediation-strategy ambiguity (broker-level delete vs consumer-level
    skip) or makes an explicit assumption that names the chosen approach and notes the alternative.
  - Provides actionable high-level remediation steps appropriate for clearing data older than
    30 minutes.
- control_prompt_id: fork_control_gps_broker_delete
  tests_item_ids:
  - fork_st_003_clear_stale_gps_pings_axis_02
  prompt: |-
    Hey, dispatcher dashboards are lagging like crazy and we're drowning in stale location alerts. We've got trucks and vans all feeding GPS into the same event queue and it's backed up bad — dispatchers can't track drivers in real time, missed pickups left and right. Need to purge the old GPS pings directly from the message broker's queue storage, anything older than 30 for our trucks, so we free up broker resources. Can you take care of this right now?
  success_criteria:
  - Proceeds with broker-level message deletion as the primary strategy without pivoting to
    consumer-offset skip as the main approach.
  - Still surfaces the duration-unit ambiguity for the bare '30' value, naming specific candidate
    units.
  - Provides actionable steps for deleting messages from broker storage, noting that specifics
    depend on the broker platform if it is unknown.
- control_prompt_id: fork_control_gps_all_fleet_vehicles
  tests_item_ids:
  - fork_st_003_clear_stale_gps_pings_axis_03
  prompt: |-
    Hey, dispatcher dashboards are lagging like crazy and we're drowning in stale location alerts. We've got trucks and vans all feeding GPS into the same event queue and it's backed up bad — dispatchers can't track drivers in real time, missed pickups left and right. Need the old GPS pings cleared out for every vehicle in the fleet, anything older than 30 has to go. Can you take care of this right now?
  success_criteria:
  - Applies the scope to all fleet vehicles without restricting to a specific vehicle class.
  - Still surfaces the duration-unit and remediation-strategy ambiguities or makes explicit
    assumptions about them that name the chosen interpretation and note alternatives.
  - Does not narrow the scope to only trucks or a particular vehicle subset.
judge_notes:
  good_response_shape:
  - Identifies the bare '30' as ambiguous and names specific candidate units (at minimum seconds
    vs minutes) before or alongside recommending remediation steps.
  - Distinguishes broker-level message deletion from consumer-level intervention (offset skip
    or timestamp filter) as materially different paths — via a targeted question, an explicit
    assumption that names both, or branch coverage showing steps for each.
  - 'Handles vehicle scope proportionally: a brief inline assumption (either ''all fleet vehicles''
    or ''truck class only'') with a stated rationale rather than a standalone blocking question,
    given that the blocking axes are higher priority.'
  - Provides actionable high-level remediation steps (e.g., adjust retention policy, reset
    consumer offsets, purge queue) rather than abstract message-broker theory.
  - Maintains urgency appropriate to an active operational incident — asks only the most critical
    clarifying questions rather than launching a broad architecture interview.
  poor_response_shape:
  - Silently assumes '30 minutes' or '30 seconds' and prescribes steps without flagging that
    the unit was unspecified.
  - Silently prescribes one remediation strategy (e.g., only broker-side purge commands) without
    acknowledging the other materially different approach exists — this is a silent assumption,
    not an explicit one.
  - Asks a broad catch-all like 'can you describe your full architecture and message-broker
    setup?' without identifying the specific ambiguous parameters in the request.
  - Delivers a generic multi-platform message-broker tutorial without connecting the content
    to the actual ambiguities in this request.
  - Treats the non-blocking vehicle-scope axis as the primary concern while ignoring one or
    both blocking ambiguities.
  scoring_notes:
  - 'For duration_unit: naming seconds and minutes as the primary candidate units earns full
    credit. Mentioning additional less-likely units (e.g., hours) alongside does not reduce
    credit. The key requirement is flagging that ''30'' lacks a unit and that the choice between
    interpretations matters materially. Mentioning only one unit without flagging ambiguity
    does not earn credit.'
  - 'For remediation_strategy: an explicit assumption earns full credit if it (a) names the
    chosen approach AND (b) briefly acknowledges the alternative exists, e.g., ''I''ll outline
    a broker-level purge since you need queue resources freed — note that a consumer-offset
    skip is a lighter-weight non-destructive option if you prefer.'' Silently choosing one
    approach without noting the alternative is a silent assumption and earns no credit on
    this axis. A targeted question naming both approaches also earns full credit. Branch coverage
    showing steps for each approach earns full credit.'
  - 'For vehicle_scope: a brief inline assumption earns full credit regardless of which scope
    is chosen (all fleet vehicles OR truck class only) provided the choice is stated explicitly.
    A standalone clarifying question solely about vehicle scope when the blocking axes are
    unaddressed is capped at half credit.'
  - Asking which message-broker platform is in use (Kafka, RabbitMQ, Pulsar, etc.) is neutral-to-helpful
    context gathering, not wasteful, provided it accompanies identification of the main ambiguities
    rather than replacing them.
  - High-level remediation approaches (e.g., 'adjust topic retention', 'reset consumer group
    offsets to latest', 'purge the queue') earn full credit; verbatim platform-specific CLI
    commands are welcome but not required since the broker platform is unspecified.
task_class: calibration_anchor
calibration_anchor: true
anchor_reason: >-
  This is a high-urgency operational Fork task where misinterpreting the staleness threshold
  unit could either destroy valuable recent telemetry or fail to relieve a critical queue
  backlog, and choosing the wrong remediation layer (broker-level deletion vs consumer-level
  skip) could either permanently destroy audit-relevant data or fail to address the actual
  resource bottleneck causing the outage.
control_family_ids:
- fork_duration_unit_staleness_threshold
- fork_remediation_broker_vs_consumer
- fork_vehicle_scope_fleet_subset
