name: Deploy Dashboard to Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'mmce/dashboard_v2/**'
      - 'mmce/results/**'
      - 'mmce/tasks/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: mmce/dashboard_v2/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci
        working-directory: mmce/dashboard_v2

      - name: Build with Next.js
        run: npm run build
        working-directory: mmce/dashboard_v2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./mmce/dashboard_v2/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
